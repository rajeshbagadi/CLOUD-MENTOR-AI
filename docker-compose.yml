version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudmentor-app
    restart: always
    ports:
      - "8501:8501"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./data/chromadb:/app/data/chromadb
      - ./data/embeddings_cache:/app/data/embeddings_cache
      - ./docs:/app/docs
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
